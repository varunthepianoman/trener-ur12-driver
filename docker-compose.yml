services:

  ursim:
    image: universalrobots/ursim_e-series
    platform: linux/amd64
    ports:
      - "5900:5900"
      - "6080:6080"
      - "29999:29999"
      - "30001:30001"
      - "30002:30002"
      - "30003:30003"
      - "30004:30004"
    volumes:
      # Mount our programs directory so the driver can load ur12_program.script
      - ./programs:/ursim/programs
    restart: unless-stopped

  ur12_driver:
    build:
      context: .
      dockerfile: Dockerfile.ros2
    network_mode: host          # Simplest: share host network, reach ursim via localhost
    environment:
      - ROS_DOMAIN_ID=0
      - ROBOT_HOST=localhost    # ursim ports are mapped to host via docker-compose
    command: >
      ros2 run ur12_driver ur_driver_node
      --ros-args
      -p robot_host:=localhost
      -p program_path:=/ursim/programs/ur12_program.script
    depends_on:
      - ursim
    restart: unless-stopped
