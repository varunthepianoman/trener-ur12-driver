controller_manager:
  ros__parameters:
    update_rate: 125  # Hz — matches RTDE publish rate

    joint_state_broadcaster:
      type: joint_state_broadcaster/JointStateBroadcaster

    # Scaffold: JointTrajectoryController wired to position command interfaces.
    # write() in the hardware interface is a no-op until the reverse interface
    # (External Control URCap, port 50001) is implemented.
    joint_trajectory_controller:
      type: joint_trajectory_controller/JointTrajectoryController

joint_state_broadcaster:
  ros__parameters:
    joints:
      - shoulder_pan_joint
      - shoulder_lift_joint
      - elbow_joint
      - wrist_1_joint
      - wrist_2_joint
      - wrist_3_joint

joint_trajectory_controller:
  ros__parameters:
    joints:
      - shoulder_pan_joint
      - shoulder_lift_joint
      - elbow_joint
      - wrist_1_joint
      - wrist_2_joint
      - wrist_3_joint
    command_interfaces:
      - position
    state_interfaces:
      - position
      - velocity
    state_publish_rate: 125.0
    action_monitor_rate: 20.0
    allow_partial_joints_goal: false
